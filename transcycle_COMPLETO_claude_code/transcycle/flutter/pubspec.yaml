name: transcycle
description: Seguimiento hormonal para mujeres trans en TRH
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP y estado
  dio: ^5.4.0
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  # Seguridad
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  # Notificaciones
  flutter_local_notifications: ^17.0.0
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  # Utilidades
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
